<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>通知测试</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 40px;
      max-width: 600px;
      margin: 0 auto;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      margin: 10px 5px;
      border-radius: 8px;
      border: none;
      background: #007AFF;
      color: white;
      cursor: pointer;
    }
    button:hover { background: #0051D5; }
    .section { margin: 30px 0; }
    h2 { color: #333; }
  </style>
</head>
<body>
  <h1>macOS 通知测试</h1>

  <div class="section">
    <h2>1. Tauri 系统通知</h2>
    <button onclick="sendTauriNotification()">发送系统通知</button>
  </div>

  <div class="section">
    <h2>2. 自定义通知窗口</h2>
    <button onclick="sendCustomNotification()">发送自定义通知</button>
  </div>

  <script>
    // 注意：此页面需要在 Tauri 应用中打开才能工作
    // 访问: http://localhost:4321/test/notification-test.html

    async function sendTauriNotification() {
      try {
        const result = await window.__TAURI__.core.invoke('test_system_notification');
        alert('系统通知已发送！');
        console.log('结果:', result);
      } catch (e) {
        alert('发送失败: ' + e);
        console.error('发送失败:', e);
      }
    }

    async function sendCustomNotification() {
      try {
        const result = await window.__TAURI__.core.invoke('test_custom_notification');
        alert('自定义通知已发送！');
        console.log('结果:', result);
      } catch (e) {
        alert('发送失败: ' + e);
        console.error('调用失败:', e);
      }
    }
  </script>
</body>
</html>
