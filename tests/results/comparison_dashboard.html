<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>视频分析模型对比</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; }

  .header { padding: 24px 32px; border-bottom: 1px solid #2a2d3a; }
  .header h1 { font-size: 22px; font-weight: 600; color: #fff; }
  .header p { font-size: 13px; color: #888; margin-top: 4px; }

  .tabs { display: flex; gap: 0; padding: 0 32px; background: #0f1117; border-bottom: 1px solid #2a2d3a; }
  .tab { padding: 12px 20px; font-size: 13px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; transition: all .15s; }
  .tab:hover { color: #ccc; }
  .tab.active { color: #7c9eff; border-bottom-color: #7c9eff; }

  .content { padding: 28px 32px; }

  /* ── 概览 ── */
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin-bottom: 32px; }
  .model-card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 10px; padding: 18px; }
  .model-card .name { font-size: 12px; color: #888; margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
  .model-card .scheme { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; margin-bottom: 12px; }
  .scheme-frame { background: #1e3a5f; color: #7eb8f7; }
  .scheme-video { background: #1e3d2f; color: #6ecf9b; }
  .model-card .rate { font-size: 28px; font-weight: 700; color: #fff; }
  .model-card .rate span { font-size: 14px; color: #888; font-weight: 400; }
  .model-card .sub { display: flex; gap: 16px; margin-top: 10px; }
  .model-card .sub-item { font-size: 12px; color: #888; }
  .model-card .sub-item strong { color: #ccc; display: block; font-size: 14px; }
  .bar-wrap { margin-top: 10px; background: #252836; border-radius: 4px; height: 5px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; }

  /* ── 热图 ── */
  .heatmap-wrap { overflow-x: auto; }
  table.heatmap { border-collapse: collapse; min-width: 100%; }
  table.heatmap th { font-size: 11px; color: #888; font-weight: 500; padding: 8px 14px; text-align: left; white-space: nowrap; }
  table.heatmap td { padding: 8px 14px; font-size: 12px; white-space: nowrap; border-top: 1px solid #1e2130; }
  table.heatmap tr:hover td { background: #1a1d27; }
  .cell-ok { color: #6ecf9b; font-weight: 600; }
  .cell-fail { color: #f47373; }
  .cell-label { color: #aaa; }
  .video-name { color: #ccc; font-size: 12px; }
  .size-badge { font-size: 10px; color: #666; margin-left: 4px; }

  /* ── 详细结果 ── */
  .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-bar select, .filter-bar input { background: #1a1d27; border: 1px solid #2a2d3a; color: #ccc; padding: 7px 12px; border-radius: 6px; font-size: 13px; outline: none; }
  .filter-bar select:focus, .filter-bar input:focus { border-color: #7c9eff; }

  .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }
  .result-card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 10px; overflow: hidden; }
  .result-card.fail { border-color: #3d2020; }
  .result-card .card-header { padding: 12px 16px; background: #1e2130; display: flex; justify-content: space-between; align-items: center; }
  .result-card .card-model { font-size: 12px; font-weight: 600; color: #7c9eff; }
  .result-card .card-video { font-size: 11px; color: #666; }
  .result-card .card-time { font-size: 11px; color: #888; }
  .result-card .card-body { padding: 14px 16px; }

  .field-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
  .field-key { font-size: 11px; color: #666; min-width: 130px; flex-shrink: 0; padding-top: 1px; }
  .field-val { font-size: 12px; color: #ccc; }
  .field-val.important { color: #fff; font-weight: 500; }
  .tag { display: inline-block; background: #252836; padding: 2px 8px; border-radius: 4px; font-size: 10px; color: #aaa; margin: 1px; }
  .score-bar { display: flex; align-items: center; gap: 8px; }
  .score-dots { display: flex; gap: 3px; }
  .dot { width: 8px; height: 8px; border-radius: 2px; background: #252836; }
  .dot.on { background: #7c9eff; }
  .dot.on.high { background: #6ecf9b; }
  .focus-deep { color: #6ecf9b; }
  .focus-normal { color: #f9c74f; }
  .focus-fragmented { color: #f47373; }
  .ocr-box { background: #0f1117; border: 1px solid #252836; border-radius: 4px; padding: 8px; font-size: 11px; color: #888; font-family: monospace; max-height: 80px; overflow-y: auto; margin-top: 4px; white-space: pre-wrap; word-break: break-all; }
  .error-box { background: #2a1515; border: 1px solid #3d2020; border-radius: 6px; padding: 10px 12px; font-size: 12px; color: #f47373; }

  .no-results { text-align: center; color: #555; padding: 60px; font-size: 14px; }

  /* ── 分析质量对比 ── */
  .quality-table { width: 100%; border-collapse: collapse; }
  .quality-table th { font-size: 11px; color: #888; font-weight: 500; padding: 8px 14px; text-align: left; border-bottom: 1px solid #2a2d3a; }
  .quality-table td { padding: 10px 14px; border-bottom: 1px solid #1e2130; font-size: 12px; vertical-align: top; }
  .quality-table tr:hover td { background: #1a1d27; }
  .q-model { color: #7c9eff; font-weight: 600; font-size: 12px; }
  .q-desc { color: #ccc; }
  .q-tags { color: #888; font-size: 11px; }
  .q-score { text-align: center; font-weight: 700; color: #fff; }
</style>
</head>

  <div class="result-grid" id="result-grid"></div>
</div>

<!-- 分析质量对比 -->
<div id="tab-quality" style="display:none">

    <select id="quality-video" onchange="renderQuality()">

  </div>
  <table class="quality-table">
    <thead>

        <th>模型</th>

        <th>应用</th>

        <th>技术栈</th>
        <th>项目</th>
      </tr>
    </thead>
    <tbody id="quality-tbody"></tbody>
  </table>
</div>

const MODELS = Object.keys(DATA);
const VIDEOS = DATA[MODELS[0]].map(r => ({ name: r.video, size: r.size_mb }));

const SCHEME = {
  'claude-sonnet-4-6': '帧提取',
  'gpt-5.2': '帧提取',
  'gemini-2.5-flash': '帧提取',
  'qwen3-vl-plus': '原生视频',
  'qwen3-vl-flash': '原生视频',
  'qwen3-vl-30b-a3b-instruct': '原生视频',
  'qwen3-vl-235b-a22b-instruct': '原生视频',
  'qwen3-vl-235b-a22b-thinking': '原生视频',
};

// ── Tab 切换 ──
function showTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['overview','heatmap','detail','quality'][i] === name);
  });
  ['overview','heatmap','detail','quality'].forEach(n => {
    document.getElementById('tab-' + n).style.display = n === name ? '' : 'none';
  });
  if (name === 'detail') renderDetail();
  if (name === 'quality') renderQuality();
}

// ── 颜色工具 ──
function timeColor(t, success) {
  if (!success) return '#3d2020';
  if (t < 60) return '#1e3d2f';
  if (t < 200) return '#2a3020';
  return '#2a2010';
}
function timeTextColor(t, success) {
  if (!success) return '#f47373';
  if (t < 60) return '#6ecf9b';
  if (t < 200) return '#c8e87a';
  return '#f9a825';
}

// ── 概览卡片 ──
function renderOverview() {
  const grid = document.getElementById('summary-grid');
  grid.innerHTML = MODELS.map(model => {
    const results = DATA[model];
    const ok = results.filter(r => r.success);
    const times = ok.map(r => r.elapsed);
    const avg = times.length ? Math.round(times.reduce((a,b)=>a+b,0)/times.length) : 0;
    const min = times.length ? Math.round(Math.min(...times)) : 0;
    const max = times.length ? Math.round(Math.max(...times)) : 0;
    const rate = ok.length / results.length;
    const scheme = SCHEME[model] || '原生视频';
    const schemeClass = scheme === '帧提取' ? 'scheme-frame' : 'scheme-video';
    const barColor = rate === 1 ? '#6ecf9b' : rate >= 0.5 ? '#f9c74f' : '#f47373';
    return `
      <div class="model-card">
        <div class="name">${model}</div>
        <span class="scheme ${schemeClass}">${scheme}</span>
        <div class="rate">${ok.length}<span>/${results.length} 成功</span></div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${rate*100}%;background:${barColor}"></div></div>
        <div class="sub">
          <div class="sub-item"><strong>${avg}s</strong>平均耗时</div>
          <div class="sub-item"><strong>${min}s</strong>最快</div>
          <div class="sub-item"><strong>${max}s</strong>最慢</div>
        </div>
      </div>`;
  }).join('');
}

function renderHeatmap() {
  const table = document.getElementById('heatmap-table');
  const shortModels = MODELS.map(m => m.replace('qwen3-vl-','q-').replace('claude-sonnet-4-6','claude').replace('gemini-2.5-flash','gemini'));
  let html = `<thead><tr><th>视频</th>${MODELS.map((m,i) => `<th title="${m}">${shortModels[i]}</th>`).join('')}</tr></thead><tbody>`;
  VIDEOS.forEach((v, vi) => {
    html += `<tr><td><span class="video-name">${v.name.slice(0,8)}…</span><span class="size-badge">${v.size}MB</span></td>`;
    MODELS.forEach(model => {
      const r = DATA[model][vi];
      const bg = timeColor(r.elapsed, r.success);
      const tc = timeTextColor(r.elapsed, r.success);
      const label = r.success ? `${r.elapsed}s` : '✗';
      html += `<td style="background:${bg};color:${tc};text-align:center;font-weight:600">${label}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

// ── 详细结果 ──
function initDetailFilters() {
  const ms = document.getElementById('filter-model');
  MODELS.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; ms.appendChild(o); });
  const vs = document.getElementById('filter-video');
  VIDEOS.forEach(v => { const o = document.createElement('option'); o.value = v.name; o.textContent = v.name.slice(0,24); vs.appendChild(o); });
}

function renderDetail() {
  const filterModel = document.getElementById('filter-model').value;
  const filterVideo = document.getElementById('filter-video').value;
  const filterStatus = document.getElementById('filter-status').value;
  const grid = document.getElementById('result-grid');

  let cards = [];
  MODELS.forEach(model => {
    if (filterModel && model !== filterModel) return;
    DATA[model].forEach(r => {
      if (filterVideo && r.video !== filterVideo) return;
      if (filterStatus === 'ok' && !r.success) return;
      if (filterStatus === 'fail' && r.success) return;
      cards.push({ model, ...r });
    });
  });

  if (!cards.length) { grid.innerHTML = '<div class="no-results">没有符合条件的结果</div>'; return; }

  grid.innerHTML = cards.map(c => {
    const a = c.answer;
    if (!c.success || !a) {
      return `<div class="result-card fail">
        <div class="card-header">
          <div><div class="card-model">${c.model}</div><div class="card-video">${c.video.slice(0,28)}</div></div>
          <div class="card-time">${c.elapsed}s</div>
        </div>
        <div class="card-body"><div class="error-box">${c.error || '未知错误'}</div></div>
      </div>`;
    }
    const score = a.productivity_score || 0;
    const dots = Array.from({length:10},(_,i)=>`<div class="dot ${i<score?'on':''}${i<score&&score>=7?' high':''}"></div>`).join('');
    const focusClass = {'deep':'focus-deep','normal':'focus-normal','fragmented':'focus-fragmented'}[a.focus_level] || '';
    const tags = (a.context_tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
    const tech = (a.technologies||[]).map(t=>`<span class="tag">${t}</span>`).join('');
    const files = (a.file_names||[]).map(t=>`<span class="tag">${t}</span>`).join('');
    const errors = (a.error_indicators||[]).map(e=>`<div style="color:#f47373;font-size:11px;margin-top:2px">⚠ ${e}</div>`).join('');
    return `<div class="result-card">
      <div class="card-header">
        <div><div class="card-model">${c.model}</div><div class="card-video">${c.video.slice(0,28)} <span style="color:#555">${c.size_mb}MB</span></div></div>
        <div class="card-time">${c.elapsed}s</div>
      </div>
      <div class="card-body">
        <div class="field-row"><span class="field-key">应用</span><span class="field-val important">${a.application||'-'}</span></div>
        <div class="field-row"><span class="field-key">窗口标题</span><span class="field-val">${a.window_title||'-'}</span></div>
        <div class="field-row"><span class="field-key">活动类型</span><span class="field-val">${a.activity_category||'-'}</span></div>
        <div class="field-row"><span class="field-key">专注度</span><span class="field-val ${focusClass}">${a.focus_level||'-'}</span></div>
        <div class="field-row"><span class="field-key">交互方式</span><span class="field-val">${a.interaction_mode||'-'}</span></div>
        <div class="field-row"><span class="field-key">效率分</span>
          <div class="score-bar"><div class="score-dots">${dots}</div><span style="font-size:12px;color:#fff;margin-left:4px">${score}/10</span></div>
        </div>
        <div class="field-row"><span class="field-key">项目</span><span class="field-val">${a.project_name||'-'}</span></div>
        <div class="field-row"><span class="field-key">活动描述</span><span class="field-val important">${a.activity_description||'-'}</span></div>
        ${a.activity_summary ? `<div class="field-row"><span class="field-key">活动摘要</span><span class="field-val">${a.activity_summary}</span></div>` : ''}
        ${tags ? `<div class="field-row"><span class="field-key">标签</span><span class="field-val">${tags}</span></div>` : ''}
        ${tech ? `<div class="field-row"><span class="field-key">技术栈</span><span class="field-val">${tech}</span></div>` : ''}
        ${files ? `<div class="field-row"><span class="field-key">文件</span><span class="field-val">${files}</span></div>` : ''}
        ${a.ocr_text ? `<div class="field-row"><span class="field-key">OCR 文本</span><div style="flex:1"><div class="ocr-box">${a.ocr_text}</div></div></div>` : ''}
        ${errors}
      </div>
    </div>`;
  }).join('');
}

// ── 分析质量对比 ──
function initQualityFilter() {
  const sel = document.getElementById('quality-video');
  VIDEOS.forEach(v => { const o = document.createElement('option'); o.value = v.name; o.textContent = v.name.slice(0,30); sel.appendChild(o); });
  sel.value = VIDEOS[0].name;
}

function renderQuality() {
  const video = document.getElementById('quality-video').value;
  const tbody = document.getElementById('quality-tbody');
  if (!video) { tbody.innerHTML = ''; return; }
  const vi = VIDEOS.findIndex(v => v.name === video);

  tbody.innerHTML = MODELS.map(model => {
    const r = DATA[model][vi];
    const scheme = SCHEME[model] || '原生视频';
    if (!r.success || !r.answer) {
      return `<tr><td class="q-model">${model}</td><td>${scheme}</td><td>${r.elapsed}s</td>
        <td colspan="7" style="color:#f47373">失败：${(r.error||'').slice(0,60)}</td></tr>`;
    }
    const a = r.answer;
    const focusClass = {'deep':'focus-deep','normal':'focus-normal','fragmented':'focus-fragmented'}[a.focus_level]||'';
    const tech = (a.technologies||[]).slice(0,5).join(', ');
    return `<tr>
      <td class="q-model">${model}</td>
      <td><span class="tag">${scheme}</span></td>
      <td style="color:#aaa">${r.elapsed}s</td>
      <td style="color:#fff">${a.application||'-'}</td>
      <td><span class="tag">${a.activity_category||'-'}</span></td>
      <td class="${focusClass}">${a.focus_level||'-'}</td>
      <td class="q-score">${a.productivity_score||'-'}</td>
      <td class="q-desc">${a.activity_description||'-'}</td>
      <td class="q-tags">${tech||'-'}</td>
      <td style="color:#aaa">${a.project_name||'-'}</td>
    </tr>`;
  }).join('');
}

// ── 初始化 ──
renderOverview();
renderHeatmap();
initDetailFilters();
initQualityFilter();
renderQuality();
</script>
</body>
</html>
