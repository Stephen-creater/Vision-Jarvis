.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.card.c-ok::before{background:#3fb950}
.card.c-warn::before{background:#d29922}
.card.c-fail::before{background:#f85149}
.card-name{font-size:11px;font-weight:600;color:#f0f6fc;margin-bottom:2px;word-break:break-word;line-height:1.3}

.card-time{font-size:18px;font-weight:700;color:#f0f6fc;line-height:1;margin-bottom:2px}

.hm-cell:hover{filter:brightness(1.25)}
.hm-cell .hm-time{font-size:12px;font-weight:700}
.hm-cell .hm-status{font-size:9px;opacity:.8}
.hm-header{display:flex;align-items:center;gap:3px;margin-bottom:3px;margin-left:178px}
.hm-vname{width:110px;font-size:10px;color:#6e7681;text-align:center}

.bar-section{margin-bottom:4px}
.hbar{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.hbar-label{width:170px;font-size:11px;color:#8b949e;text-align:right;padding-right:8px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar-track{flex:1;height:22px;background:#161b22;border-radius:4px;overflow:hidden;min-width:0}
.hbar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 8px;min-width:1px;transition:width .4s}
.hbar-text{font-size:11px;color:#fff;white-space:nowrap}
.hbar-side{width:52px;font-size:11px;color:#6e7681;flex-shrink:0;text-align:right}
.legend{display:flex;gap:14px;margin-top:8px;font-size:11px;color:#6e7681}
.dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:3px;vertical-align:middle}

.tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.tab{padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid #30363d;background:#161b22;color:#8b949e;transition:all .15s}

.ocr-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#388bfd,#79c0ff)}

/* tooltip */

var maxTime=Math.max.apply(null,D.filter(function(d){return d.avg_time;}).map(function(d){return d.avg_time;}));
var maxOcr=Math.max.apply(null,D.map(function(d){return d.avg_ocr;}));

function sc(d){return d.ok===d.total?"c-ok":d.ok===0?"c-fail":"c-warn";}
function badge(d){
  if(d.ok===d.total) return '<span class="card-badge bg-ok">全部可用</span>';
  if(d.ok===0) return '<span class="card-badge bg-fail">全部失败</span>';
  return '<span class="card-badge bg-warn">不稳定 '+d.ok+'/'+d.total+'</span>';
}

// ── 卡片 ──
var cardsEl=document.getElementById("cards");
D.forEach(function(d){
  var pct=d.avg_time?Math.round(d.avg_time/maxTime*100):0;
  var fc=d.ok===0?"#30363d":d.thinking?"#d29922":"#388bfd";
  var el=document.createElement("div");
  el.className="card "+sc(d);
  el.innerHTML='<div class="card-name">'+d.model+'</div>'
    +'<div class="card-type">'+(d.thinking?"Thinking":"Instruct")+'</div>'
    +badge(d)
    +'<div class="card-time">'+(d.avg_time?d.avg_time+'s':'—')+'</div>'
    +'<div class="card-sub">平均耗时（成功）</div>'
    +'<div class="card-rate">OCR均 '+(d.avg_ocr||'—')+'字</div>'
    +'<div class="mini-bar"><div class="mini-fill" style="width:'+pct+'%;background:'+fc+'"></div></div>';
  cardsEl.appendChild(el);
});

// ── 热力图 ──
var tip=document.getElementById("tip");
function showTip(e,html){tip.innerHTML=html;tip.style.opacity=1;moveTip(e);}
function moveTip(e){tip.style.left=(e.clientX+12)+"px";tip.style.top=(e.clientY+12)+"px";}
function hideTip(){tip.style.opacity=0;}

var hmHead=document.getElementById("hm-header");
VIDEOS.forEach(function(v){
  var d=document.createElement("div");d.className="hm-vname";d.textContent=v.replace(" ","");
  hmHead.appendChild(d);
});

var hm=document.getElementById("heatmap");
D.forEach(function(d){
  var row=document.createElement("div");row.className="hm-row";
  var lbl=document.createElement("div");lbl.className="hm-label";lbl.textContent=d.model;
  row.appendChild(lbl);
  d.videos.forEach(function(v){
    var cell=document.createElement("div");cell.className="hm-cell";
    var bg,fg,timeStr,statusStr;
    if(v.ok){
      var t=v.elapsed;
      // 绿=快，黄=中，橙=慢
      var ratio=t/150;
      if(ratio<0.25){bg="#0d4429";fg="#3fb950";}
      else if(ratio<0.5){bg="#1a3a1a";fg="#56d364";}
      else if(ratio<0.75){bg="#3d2200";fg="#d29922";}
      else{bg="#3d1700";fg="#f0883e";}
      timeStr=t+"s";statusStr="OK";
    } else {
      var ft=v.fail_type||"失败";
      if(ft.indexOf("500")>=0){bg="#3d0c0a";fg="#f85149";statusStr="500";}
      else{bg="#2d1b00";fg="#d29922";statusStr="JSON";}
      timeStr=v.elapsed+"s";
    }
    cell.style.background=bg;cell.style.color=fg;
    cell.innerHTML='<span class="hm-time">'+timeStr+'</span><span class="hm-status">'+statusStr+'</span>';
    cell.addEventListener("mouseenter",function(e){
      var info='<b>'+d.model+'</b><br>'+v.video+'<br>';
      if(v.ok){
        info+='耗时: '+v.elapsed+'s<br>';
        if(v.app) info+='应用: '+v.app+'<br>';
        if(v.desc) info+='描述: '+v.desc;
      } else {
        info+='失败原因: '+(v.fail_type||"未知")+'<br>耗时: '+v.elapsed+'s';
      }
      showTip(e,info);
    });
    cell.addEventListener("mousemove",moveTip);
    cell.addEventListener("mouseleave",hideTip);
    row.appendChild(cell);
  });
  hm.appendChild(row);
});

// ── 耗时条图 ──
var timeBars=document.getElementById("time-bars");
D.forEach(function(d){
  var pct=d.avg_time?Math.round(d.avg_time/maxTime*100):0;
  var fc=d.ok===0?"#30363d":d.thinking?"#d29922":"#388bfd";
  var row=document.createElement("div");row.className="hbar";
  row.innerHTML='<div class="hbar-label">'+d.model+'</div>'
    +'<div class="hbar-track"><div class="hbar-fill" style="width:'+pct+'%;background:'+fc+'">'
      +(d.avg_time?'<span class="hbar-text">'+d.avg_time+'s</span>':'')
    +'</div></div>'
    +'<div class="hbar-side">'+(d.ok===0?'全失败':'')+'</div>';
  timeBars.appendChild(row);
});

// ── OCR条图 ──
var ocrBars=document.getElementById("ocr-bars");
D.forEach(function(d){
  var pct=maxOcr?Math.round(d.avg_ocr/maxOcr*100):0;
  var fc=d.ok===0?"#30363d":"#3fb950";
  var row=document.createElement("div");row.className="hbar";
  row.innerHTML='<div class="hbar-label">'+d.model+'</div>'
    +'<div class="hbar-track"><div class="hbar-fill" style="width:'+pct+'%;background:'+fc+'">'
      +(d.avg_ocr?'<span class="hbar-text">'+d.avg_ocr+'字</span>':'')
    +'</div></div>'
    +'<div class="hbar-side">'+(d.ok===0?'不可用':'')+'</div>';
  ocrBars.appendChild(row);
});

// ── 详细表 ──
var tabsEl=document.getElementById("tabs");
VIDEOS.forEach(function(v,i){
  var t=document.createElement("div");
  t.className="tab"+(i===0?" on":"");
  t.textContent="视频"+(i+1)+" · "+v;
  t.onclick=function(){
    document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("on");});
    t.classList.add("on");renderTable(i);
  };
  tabsEl.appendChild(t);
});

function renderTable(vi){
  var tbody=document.getElementById("tbody");
  tbody.innerHTML="";
  D.forEach(function(d){
    var v=d.videos[vi];
    if(!v) return;
    var tr=document.createElement("tr");
    if(!v.ok){
      var ft=v.fail_type||"失败";
      var fc=ft.indexOf("500")>=0?"#f85149":"#d29922";
      tr.innerHTML='<td style="color:#58a6ff;font-weight:600">'+d.model+'</td>'
        +'<td class="tc-fail">✗ '+ft+'</td>'
        +'<td>'+v.elapsed+'s</td>'
        +'<td colspan="8" class="tc-gray">—</td>';
    } else {
      var catMap={"work":"pill-b","learning":"pill-g","entertainment":"pill-r","communication":"pill-y"};
      var catCls=catMap[v.cat]||"";
      var focusCls=v.focus==="deep"?"pill-y":v.focus==="fragmented"?"pill-r":"";
      var ocrPct=maxOcr?Math.round(v.ocr_len/maxOcr*100):0;
      var techStr=(v.techs||[]).slice(0,4).join(", ")||"—";
      var errStr=v.errs&&v.errs.length?'<span style="color:#d29922">⚠ '+v.errs.length+'条</span>':'<span class="tc-gray">—</span>';
      tr.innerHTML='<td style="color:#58a6ff;font-weight:600">'+d.model+'</td>'
        +'<td class="tc-ok">✓ 成功</td>'
        +'<td>'+v.elapsed+'s</td>'
        +'<td>'+(v.app||"—")+'</td>'
        +'<td><span class="pill '+catCls+'">'+(v.cat||"—")+'</span></td>'
        +'<td><span class="pill '+focusCls+'">'+(v.focus||"—")+'</span></td>'
        +'<td style="text-align:center">'+(v.score||"—")+'</td>'
        +'<td>'+v.ocr_len+'字<br><span class="ocr-bar"><span class="ocr-fill" style="width:'+ocrPct+'%"></span></span></td>'
        +'<td class="tc-gray">'+techStr+'</td>'
        +'<td>'+errStr+'</td>'
        +'<td class="tc-gray" style="max-width:200px;word-break:break-all">'+(v.desc||"")+'</td>';
    }
    tbody.appendChild(tr);
  });
}
renderTable(0);
</script>
</body>
</html>
